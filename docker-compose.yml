services:
  camper:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: camper-reiseplaner:latest
    container_name: camper-reiseplaner
    restart: unless-stopped
    environment:
      # Google-Maps-API-Key – aus der .env-Datei (siehe .env.example).
      # Ohne Key lädt die Karte nicht.
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      # host:container – Standard-Port des Containers ist 8000.
      # Tipp: hinter einen Reverse-Proxy/VPN hängen, es gibt KEIN Login.
      - "${CAMPER_PORT:-8082}:8000"
    volumes:
      - camper-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  camper-data:
