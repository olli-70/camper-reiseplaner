services:
  camper:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: camper-reiseplaner:latest
    container_name: camper-reiseplaner
    restart: unless-stopped
    ports:
      # Nur intern / im Tailnet erreichbar – kein öffentlicher Port.
      - "8082:8000"
    volumes:
      - camper-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  camper-data:
