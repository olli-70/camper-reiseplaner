<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Camper-Reiseplaner</title>
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Camper" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="topbar">
    <strong class="brand" title="Camper-Reiseplaner">🚐</strong>
    <button id="tourMenuBtn" class="tour-name" title="Tour wechseln"><span id="tourNameLabel">–</span> ▾</button>
    <button id="tourEditBtn" title="Tour-Einstellungen (Start/Ziel, Datum)">⚙️</button>
    <button id="newTripBtn" title="Neue Reise anlegen">＋</button>
    <span class="profile-wrap">
      <button id="profileBtn" class="profile" title="Profil">👤 <span id="profileEmail" class="profile-email">–</span> ▾</button>
      <div id="profileMenu" class="hidden">
        <div id="profileMenuEmail" class="menu-head"></div>
        <button id="exportBtn" class="menu-item">⬇ Reisen als CSV</button>
        <button id="logoutBtn" class="menu-item">⎋ Abmelden</button>
      </div>
    </span>
    <span id="appVersion" class="version" title="App-Version"></span>
    <a id="repoLink" class="repo-link" href="https://github.com/olli-70/camper-reiseplaner"
       target="_blank" rel="noopener noreferrer" title="Quellcode auf GitHub" aria-label="Quellcode auf GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <span id="hint" class="hint"></span>
    <div id="tourMenu" class="hidden"></div>
  </header>

  <div id="map"></div>

  <aside id="panel">
    <button id="panelToggle" title="Liste ein-/ausblenden">☰</button>
    <div id="panelBody">
      <div id="searchBox">
        <input id="searchInput" type="search" placeholder="Ort suchen …" />
        <button id="searchBtn" title="Suchen">🔍</button>
      </div>
      <div id="routeSearchBox">
        <select id="routeLegSelect" title="Etappe wählen (oder ganze Route)">
          <option value="all">— keine Route —</option>
        </select>
        <button id="routeSearchBtn" title="Stellplätze & Campingplätze entlang der gewählten Strecke finden">🏕 Stellplätze suchen</button>
      </div>
      <div id="searchResults"></div>
      <h2 id="tripTitle">–</h2>
      <div id="tripDates" class="trip-dates"></div>
      <div id="tripTotal" class="trip-total"></div>
      <details id="stopSection" class="list-section" open>
        <summary>🛏 Übernachtungen <span id="stopCount"></span></summary>
        <ul id="stopList"></ul>
      </details>
      <details id="poiSection" class="list-section">
        <summary>📍 Punkte <span id="poiCount"></span></summary>
        <ul id="poiList"></ul>
      </details>
    </div>
  </aside>

  <!-- Formular für Anlegen/Bearbeiten eines Stopps -->
  <div id="stopForm" class="hidden">
    <div class="form-card">
      <h3 id="formTitle">Stopp</h3>
      <!-- Felder werden aus STOP_FIELDS (app.js) generiert -->
      <div id="formFields"></div>
      <div class="coords">Koordinaten: <span id="f_coords">–</span></div>
      <div class="form-actions">
        <button id="f_cancel" class="ghost">Abbrechen</button>
        <button id="f_save" class="primary">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Rückfrage vor dem Hinzufügen eines per Kartenklick gewählten Ortes -->
  <div id="confirmModal" class="hidden">
    <div class="form-card">
      <h3>Ort hinzufügen?</h3>
      <p id="confirmText">Möchtest du diesen Ort zu deiner Reise hinzufügen? Den Namen kannst du anpassen:</p>
      <label>Name <input id="c_name" type="text" /></label>
      <label>Art
        <select id="c_kind">
          <option value="stop">🛏 Übernachtungsplatz</option>
          <option value="poi">📍 Punkt (nur Karte)</option>
        </select>
      </label>
      <div class="form-actions">
        <button id="c_cancel" class="ghost">Abbrechen</button>
        <button id="c_ok" class="primary">Ja, hinzufügen</button>
      </div>
    </div>
  </div>

  <!-- Tour-Einstellungen: Start-/Zieladresse + Abfahrt/Rückkehr -->
  <div id="tourForm" class="hidden">
    <div class="form-card">
      <h3>Tour-Einstellungen</h3>
      <label>Name <input id="t_name" type="text" /></label>
      <label>Startadresse (z.B. Heimat) <input id="t_start" type="text" placeholder="Straße, Ort" /></label>
      <label>Zieladresse <input id="t_end" type="text" placeholder="leer = wie Start (Rundreise)" /></label>
      <label>Abfahrt <input id="t_abfahrt" type="date" /></label>
      <label>Rückkehr <input id="t_rueckkehr" type="date" /></label>
      <label class="check"><input id="t_gesperrt" type="checkbox" /> abgesperrt (schützt vor versehentlichem Ändern)</label>
      <div id="t_status" class="coords"></div>
      <button type="button" id="t_export" class="ghost">⬇ Diese Reise als CSV</button>
      <div class="form-actions">
        <button id="t_cancel" class="ghost">Abbrechen</button>
        <button id="t_save" class="primary">Speichern</button>
      </div>
    </div>
  </div>

  <!-- Login / Registrierung (verdeckt die App, bis angemeldet) -->
  <div id="authOverlay" class="hidden">
    <div class="auth-card">
      <h2>🚐 Camper-Reiseplaner</h2>
      <p id="authSubtitle">Bitte anmelden</p>
      <label>E-Mail
        <input id="authEmail" type="email" autocomplete="email" placeholder="name@example.de" />
      </label>
      <label>Passwort
        <input id="authPassword" type="password" autocomplete="current-password" />
      </label>
      <label id="authInviteRow" class="hidden">Einmalcode
        <input id="authInvite" type="text" autocomplete="off" placeholder="z. B. mox2-xtra-35wz" />
      </label>
      <div id="authError" class="auth-error"></div>
      <button id="authSubmit" class="primary">Anmelden</button>
      <p class="auth-toggle">
        <span id="authToggleText">Noch kein Konto?</span>
        <a id="authToggle" href="#">Registrieren</a>
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
